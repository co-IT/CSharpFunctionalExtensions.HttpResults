name: Release to NuGet

on:
  workflow_dispatch:

jobs:
  build:
    name: nuget Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory dist/tests --collect:"XPlat Code Coverage"

      - name: Upload dotnet test results
        uses: actions/upload-artifact@v3
        with:
          name: dotnet-test-results
          path: dist/tests/test-results.trx
        if: ${{ always() }}

      - name: Upload dotnet test coverage
        uses: actions/upload-artifact@v3
        with:
          name: dotnet-test-coverage
          path: dist/tests/**/coverage.cobertura.xml
        if: ${{ always() }}

      - name: Upload dotnet test coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: dist/tests/**/coverage.cobertura.xml
        if: ${{ always() }}
        
      - name: Pack 
        run: dotnet pack CSharpFunctionalExtensions.HttpResults -c Release --no-restore --no-build --output dist/package
        
      - name: Push to NuGet
        run: dotnet nuget push "dist/package/*.nupkg" --api-key ${{secrets.nuget_api_key}} --source https://api.nuget.org/v3/index.json